<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Computex 2026 ASRock — AMD Ryzen AI Demo</title>
    <style>
        /* ================================================================
           CSS Variables & Reset
           ================================================================ */
        :root {
            --bg-dark: #0a0a0c;
            --bg-panel: #14141a;
            --bg-cue: #1a1a10;
            --bg-output: #111115;
            --border-color: #2a2a35;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --text-cue: #facc15;

            --act1: #38bdf8;   /* Blue  — NPU/Whisper */
            --act2: #06b6d4;   /* Cyan  — Hybrid */
            --act3: #facc15;   /* Yellow — CPU/TTS */
            --act4: #22c55e;   /* Green — Radeon/Image */
            --act5: #a855f7;   /* Purple — Debate */

            --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'Consolas', 'Source Code Pro', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ================================================================
           Layout — CSS Grid
           ================================================================ */
        .app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 2fr 3fr;
            grid-template-areas:
                "header header"
                "cue    output"
                "footer footer";
            height: 100vh;
            height: 100dvh;
        }

        /* ================================================================
           Header
           ================================================================ */
        .header {
            grid-area: header;
            background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-dark) 100%);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .header-title span {
            background: linear-gradient(90deg, #ff8c00, #e0393a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--act4); }

        /* Language Toggle */
        .lang-toggle {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            font-size: 0.8rem;
        }
        .lang-btn {
            padding: 0.25rem 0.6rem;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn:hover { color: var(--text-secondary); }
        .lang-btn.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        /* ================================================================
           Left Panel — Cue
           ================================================================ */
        .cue-panel {
            grid-area: cue;
            background: var(--bg-cue);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.8rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .act-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .act-num {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.3rem;
            transition: color 0.3s;
        }
        .act-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .act-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
        }
        .hw-badge {
            font-size: 1rem;
            font-family: var(--font-mono);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .cue-box {
            background: rgba(250, 204, 21, 0.08);
            border: 1px solid rgba(250, 204, 21, 0.25);
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.5rem;
        }
        .cue-text {
            font-size: 1.8rem;
            line-height: 1.5;
            color: var(--text-cue);
            font-weight: 500;
        }
        .cue-hint {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .cue-spacer { flex: 1; }
        .action-btn {
            width: 100%;
            min-height: 80px;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s, filter 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn:hover  { filter: brightness(1.15); }
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: none;
            transform: none;
        }

        /* ================================================================
           Right Panel — Output
           ================================================================ */
        .output-panel {
            grid-area: output;
            background: var(--bg-output);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .output-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .output-content {
            flex: 1;
            font-size: 1.2rem;
            line-height: 1.7;
        }

        /* Transcript (Act 1) */
        .transcript-area {
            font-size: 1.6rem;
            line-height: 1.8;
            min-height: 200px;
        }
        .transcript-interim { color: var(--text-muted); }
        .transcript-final   { color: var(--text-primary); }
        .mic-level {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin-top: 1rem;
            overflow: hidden;
        }
        .mic-level-bar {
            height: 100%;
            background: var(--act1);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        /* Benchmark (Act 2) */
        .benchmark-prompt {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .benchmark-run { margin-bottom: 1.5rem; }
        .benchmark-run-label {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .benchmark-response {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            min-height: 40px;
        }
        .benchmark-stats {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        .benchmark-chart { margin-top: 2rem; display: none; }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }
        .bar-label { width: 80px; font-weight: 700; font-size: 1.1rem; text-align: right; }
        .bar-track {
            flex: 1; height: 36px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%; border-radius: 8px; width: 0%;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex; align-items: center; padding-left: 1rem;
            font-weight: 700; font-size: 1rem; color: #fff;
        }
        .bar-value { width: 100px; font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; }
        .benchmark-winner { font-size: 1.3rem; font-weight: 700; margin-top: 1.5rem; display: none; }

        /* TTS (Act 3) */
        .tts-text { font-size: 1.6rem; line-height: 1.8; margin-bottom: 2rem; }
        .audio-progress { height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; margin-top: 1rem; }
        .audio-progress-bar { height: 100%; background: var(--act3); border-radius: 4px; width: 0%; transition: width 0.3s; }

        /* Image (Act 4) */
        .image-prompt { font-size: 1.2rem; color: var(--text-secondary); font-style: italic; margin-bottom: 1.5rem; }
        .image-container {
            position: relative; max-width: 512px; aspect-ratio: 1;
            border-radius: 12px; overflow: hidden; background: var(--bg-panel);
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s; }
        .image-container img.loaded { opacity: 1; }
        .shimmer {
            position: absolute; inset: 0;
            background: linear-gradient(110deg, var(--bg-panel) 30%, rgba(255,255,255,0.06) 50%, var(--bg-panel) 70%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .image-backend-badge { font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-muted); margin-top: 0.8rem; }

        /* Debate (Act 5) */
        .debate-models { list-style: none; margin-bottom: 1.5rem; }
        .debate-models li {
            font-size: 1.1rem; padding: 0.4rem 0;
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .debate-models .model-size { color: var(--text-muted); font-family: var(--font-mono); }
        .debate-total { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
        .debate-slots { font-size: 1rem; margin-bottom: 1rem; }
        .debate-restart-cmd {
            font-family: var(--font-mono); font-size: 0.95rem;
            background: rgba(255,255,255,0.05); padding: 0.8rem 1rem;
            border-radius: 8px; border: 1px solid var(--border-color);
            color: var(--text-secondary); margin-top: 0.5rem;
        }

        /* ================================================================
           Footer — Progress
           ================================================================ */
        .footer {
            grid-area: footer; background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            padding: 0.5rem 1.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
        }
        .footer-act {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.8rem; border-radius: 6px;
            font-size: 0.85rem; cursor: pointer;
            transition: background 0.2s; color: var(--text-muted);
        }
        .footer-act:hover { background: rgba(255,255,255,0.05); }
        .footer-act.done  { color: var(--act4); }
        .footer-act.current { color: var(--text-primary); background: rgba(255,255,255,0.08); font-weight: 700; }
        .footer-sep { width: 24px; height: 1px; background: var(--border-color); }

        /* ================================================================
           Welcome Overlay
           ================================================================ */
        .overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        .welcome-title { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
        .welcome-sub { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2.5rem; }
        .welcome-hw { list-style: none; margin-bottom: 2.5rem; }
        .welcome-hw li { font-size: 1.2rem; padding: 0.4rem 0; display: flex; gap: 1rem; }
        .welcome-hw .hw-role { font-weight: 700; width: 140px; text-align: right; }
        .welcome-hw .hw-desc { color: var(--text-secondary); }
        .welcome-lang {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
        }
        .welcome-lang-btn {
            padding: 0.5rem 1.2rem; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-muted);
            border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600;
            transition: all 0.2s;
        }
        .welcome-lang-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
        .welcome-lang-btn.active { background: rgba(255,255,255,0.1); color: var(--text-primary); border-color: var(--text-primary); }
        .welcome-start {
            min-width: 280px; min-height: 72px; font-size: 1.6rem; font-weight: 700;
            border: none; border-radius: 14px; cursor: pointer; color: #fff;
            background: linear-gradient(135deg, var(--act1), var(--act5));
            transition: transform 0.1s, filter 0.1s;
        }
        .welcome-start:hover  { filter: brightness(1.15); }
        .welcome-start:active { transform: scale(0.97); }

        /* ================================================================
           Error overlay
           ================================================================ */
        .error-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-panel); border: 1px solid #ef4444; border-radius: 14px;
            padding: 2rem 2.5rem; z-index: 200; text-align: center; display: none; max-width: 500px;
        }
        .error-banner.show { display: block; }
        .error-banner h3 { color: #ef4444; margin-bottom: 0.8rem; font-size: 1.3rem; }
        .error-banner p  { color: var(--text-secondary); margin-bottom: 1rem; }
        .error-banner button {
            padding: 0.5rem 1.5rem; border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.08); color: var(--text-primary);
            border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 0 0.3rem;
        }

        /* ================================================================
           Utilities
           ================================================================ */
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid var(--text-muted); border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulsing { animation: pulse 1.5s ease-in-out infinite; }
        .hidden { display: none !important; }

        /* ================================================================
           Act 0: AMD AI Stack Diagram
           ================================================================ */
        .stack-diagram {
            display: flex; flex-direction: column; gap: 0.55rem;
            padding: 0.2rem; font-size: 0.93rem;
        }
        .stack-title {
            font-size: 1.2rem; font-weight: 700; color: #ff8c00;
            text-align: center; margin-bottom: 0.2rem; letter-spacing: 0.03em;
        }
        .stack-app-box {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
            padding: 0.45rem 1rem; text-align: center; color: var(--text-primary);
        }
        .stack-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.55rem;
        }
        .stack-row-arrow {
            font-size: 1rem; color: var(--text-muted);
            text-align: center; align-items: center; justify-items: center;
            margin: -0.15rem 0;
        }
        .stack-col {
            border-radius: 6px; padding: 0.45rem 0.6rem; text-align: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
        }
        .stack-col.npu-col  { background: rgba(56,189,248,0.10); border-color: rgba(56,189,248,0.5); }
        .stack-col.gpu-col  { background: rgba(34,197,94,0.10);  border-color: rgba(34,197,94,0.5); }
        .stack-col.rocm-col { opacity: 0.38; filter: grayscale(0.6); }
        .stack-col-title { font-weight: 600; color: var(--text-primary); font-size: 0.93rem; }
        .stack-col.npu-col  .stack-col-title { color: #38bdf8; }
        .stack-col.gpu-col  .stack-col-title { color: #22c55e; }
        .stack-col-sub  { font-size: 0.76rem; color: var(--text-muted); margin-top: 0.12rem; }
        .demo-badge {
            display: inline-block; margin-top: 0.3rem;
            font-size: 0.7rem; font-weight: 600;
            background: rgba(255,255,255,0.12); border-radius: 4px;
            padding: 0.08rem 0.35rem; color: var(--text-secondary);
        }
        .rocm-no { margin-top: 0.3rem; font-size: 0.7rem; color: #ef4444; font-weight: 600; }
        .stack-cpu-note {
            text-align: center; font-size: 0.85rem;
            color: var(--act3); padding: 0.15rem 0;
        }
        .stack-insight {
            background: rgba(255,140,0,0.07); border: 1px solid rgba(255,140,0,0.25);
            border-radius: 6px; padding: 0.6rem 0.9rem;
            font-size: 0.85rem; color: var(--text-secondary); line-height: 1.55;
        }
        .stack-insight strong { color: var(--text-primary); }
    </style>
</head>
<body>

<!-- ================================================================
     Welcome Overlay
     ================================================================ -->
<div id="welcome" class="overlay">
    <div class="welcome-title">Computex 2026 ASRock</div>
    <div class="welcome-sub">AMD Ryzen AI &mdash; Demo Orchestrator</div>
    <ul class="welcome-hw" id="welcome-hw"></ul>
    <div class="welcome-lang" id="welcome-lang"></div>
    <div class="welcome-sub" style="font-size:1rem;color:var(--text-muted);margin-bottom:1rem" id="welcome-server"></div>
    <button class="welcome-start" id="btn-start-demo" disabled></button>
</div>

<!-- ================================================================
     Error Banner
     ================================================================ -->
<div id="error-banner" class="error-banner">
    <h3 id="error-title">Error</h3>
    <p id="error-msg"></p>
    <button id="error-close-btn" onclick="dismissError()"></button>
    <button id="error-skip-btn" class="hidden" onclick="skipAct()"></button>
</div>

<!-- ================================================================
     Main App
     ================================================================ -->
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            Computex 2026 ASRock<span>&mdash; AMD Ryzen AI Demo</span>
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="header-lang">
                <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
            </div>
            <div class="header-status">
                <span id="server-label">localhost:13305</span>
                <div class="status-dot" id="status-dot"></div>
            </div>
        </div>
    </div>

    <!-- Left: Cue Panel -->
    <div class="cue-panel" id="cue-panel">
        <div class="act-badge" id="cue-badge"></div>
        <div class="act-num" id="cue-num"></div>
        <div class="act-title" id="cue-title"></div>
        <div class="act-subtitle" id="cue-subtitle"></div>
        <div class="hw-badge" id="cue-hw"></div>
        <div class="cue-box">
            <div class="cue-text" id="cue-text"></div>
        </div>
        <div class="cue-hint" id="cue-hint"></div>
        <div class="cue-spacer"></div>
        <button class="action-btn" id="action-btn"></button>
    </div>

    <!-- Right: Output Panel -->
    <div class="output-panel" id="output-panel">
        <div class="output-title" id="output-title"></div>
        <div class="output-content" id="output-content"></div>
    </div>

    <!-- Footer -->
    <div class="footer" id="footer"></div>
</div>

<script>
/* ==================================================================
   i18n — Bilingual strings
   ================================================================== */
const I18N = {
    // Welcome screen
    welcomeHw: {
        zh: [
            { role: 'NPU 聽', desc: 'XDNA2 55 TOPS' },
            { role: 'CPU 說', desc: 'Ryzen AI 9 HX 375' },
            { role: 'iGPU 畫', desc: 'Radeon 890M RDNA 3.5' },
        ],
        en: [
            { role: 'NPU Listens', desc: 'XDNA2 55 TOPS' },
            { role: 'CPU Speaks', desc: 'Ryzen AI 9 HX 375' },
            { role: 'iGPU Draws', desc: 'Radeon 890M RDNA 3.5' },
        ],
    },
    connectingServer: { zh: '正在連線 server…', en: 'Connecting to server...' },
    serverOk:         { zh: (h,p) => `✔ Server 連線正常 (${h}:${p})`, en: (h,p) => `✔ Server connected (${h}:${p})` },
    serverFail:       { zh: url => `✘ 無法連線到 ${url}`, en: url => `✘ Cannot reach ${url}` },
    startDemo:        { zh: '開始 Demo', en: 'Start Demo' },

    // Acts — per-act bilingual content
    acts: [
        { // Act 0
            title:    { zh: 'AMD AI 軟體堆疊', en: 'AMD AI Software Stack' },
            subtitle: { zh: '架構概覽', en: 'Architecture Overview' },
            cue: {
                zh: '「NPU、iGPU、CPU 各司其職——\n但 ROCm 不在這裡。\n這台機器靠另一套路徑跑 AI：\nXDNA2 NPU · Radeon 890M · Vulkan」\n\n「不需要獨顯，不需要雲端，\n這就是 Ryzen AI 的意義。」',
                en: '"NPU, iGPU, and CPU each play a role —\nbut ROCm is not part of this.\nThis machine runs AI on a different path:\nXDNA2 NPU · Radeon 890M · Vulkan"\n\n"No discrete GPU. No cloud.\nThat\'s the point of Ryzen AI."',
            },
            hint: {
                zh: '點擊「下一步」開始第一幕。',
                en: 'Click Next to begin Act 1.',
            },
            btnStart: { zh: '📊 顯示架構圖', en: '📊 Show Stack' },
        },
        { // Act 1
            title:    { zh: '語音進來', en: 'Speech In' },
            subtitle: { zh: 'Speech In', en: 'Realtime Transcription' },

/* ==================================================================
   Text Helpers
   ================================================================== */
/**
 * Strip <think>...</think> blocks produced by DeepSeek-R1.
 * Uses index-based search (case-insensitive) instead of regex, which is
 * more reliable across different model output formats.
 *
 * Strategy:
 *   - If </think> exists → show everything AFTER the last closing tag
 *   - If <think> exists but no </think> → model is still in thinking phase, show nothing
 *   - If neither tag → model doesn't use thinking tags, show full text
 */
function stripThinking(text) {
    const lc = text.toLowerCase();
    const closeIdx = lc.lastIndexOf('</think>');
    if (closeIdx !== -1) {
        return text.slice(closeIdx + '</think>'.length).replace(/^\s+/, '');
    }
    if (lc.includes('<think>')) {
        return ''; // Still streaming the thinking block
    }
    return text;
}

   ================================================================== */
async function fetchJSON(path, timeout = 10000) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeout);
    try {
        const r = await fetch(`${CONFIG.serverUrl}${path}`, { signal: ctrl.signal });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
    } finally { clearTimeout(timer); }
}

async function postJSON(path, body, timeout = 600000) {
    const ctrl = new AbortController();
    STATE.abortControllers.push(ctrl);
    const timer = setTimeout(() => ctrl.abort(), timeout);
    try {
        const r = await fetch(`${CONFIG.serverUrl}${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: ctrl.signal,
        });
        if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${r.status}`);
        }
        return r;
    } finally {
        clearTimeout(timer);
        STATE.abortControllers = STATE.abortControllers.filter(c => c !== ctrl);
    }
}

async function streamSSE(path, body, onDelta, timeout = 180000) {
    const ctrl = new AbortController();
    STATE.abortControllers.push(ctrl);
    const timer = setTimeout(() => ctrl.abort(), timeout);
    try {
        const r = await fetch(`${CONFIG.serverUrl}${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: ctrl.signal,
        });
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            for (const line of chunk.split('\n')) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                    const json = JSON.parse(data);
                    const delta = json.choices?.[0]?.delta?.content || '';
                    full += delta;
                    onDelta(full, delta);
                } catch (_) {}
            }
        }
        return full;
    } finally {
        clearTimeout(timer);
        STATE.abortControllers = STATE.abortControllers.filter(c => c !== ctrl);
    }
}

    } catch {
        STATE.imageBackend = 'cpu';
    }
}

   ================================================================== */
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const advanceKeys = ['Enter', ' ', 'PageDown', 'ArrowRight', 'ArrowDown'];
    if (advanceKeys.includes(e.key)) {
        e.preventDefault();
        if (STATE.phase === 'running' && STATE.currentAct === 1) stopAct1();
        else advance();
    }
    if (e.key === 'Escape') { e.preventDefault(); emergencyStop(); }
});

el.actionBtn.addEventListener('click', () => {
    if (STATE.phase === 'running' && STATE.currentAct === 1) stopAct1();
    else advance();
});

function emergencyStop() {
    if (STATE.phase !== 'running') return;
    abortAll();
    cleanupCurrentAct();
    actDone();
}

function cleanupCurrentAct() {
    abortAll();
    if (STATE.ws) { try { STATE.ws.close(); } catch(_) {} STATE.ws = null; }
    if (STATE.processor) { try { STATE.processor.disconnect(); } catch(_) {} STATE.processor = null; }
    if (STATE.audioCtx) { try { STATE.audioCtx.close(); } catch(_) {} STATE.audioCtx = null; }
    if (STATE.micStream) { STATE.micStream.getTracks().forEach(t => t.stop()); STATE.micStream = null; }
    if (STATE.audioEl) { STATE.audioEl.pause(); STATE.audioEl = null; }
}

/* ==================================================================
   Act 1: Whisper Realtime Transcription
   ================================================================== */
async function runAct1() {
    const act = getAct(1);
    el.actionBtn.textContent = act.btnStop;
    el.actionBtn.disabled = false;

    el.outputContent.innerHTML =
        '<div class="transcript-area" id="transcript"></div>' +
        '<div class="mic-level"><div class="mic-level-bar" id="mic-level"></div></div>' +
        `<div style="margin-top:0.8rem;color:var(--text-muted);font-size:0.9rem" id="act1-status">${t('loadingModel')}</div>`;

    const statusEl = $('act1-status');
    const transcriptEl = $('transcript');
    let finalText = '';
    let interimText = '';

    try {
        await postJSON('/v1/load', { model_name: 'Whisper-Large-v3-Turbo' });
        statusEl.textContent = t('modelLoadedMic');

        if (!STATE.wsPort) {
            const health = await fetchJSON('/v1/health');
            STATE.wsPort = health.websocket_port;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
        });
        STATE.micStream = stream;

        const audioCtx = new AudioContext();
        STATE.audioCtx = audioCtx;
        const nativeRate = audioCtx.sampleRate;
        const source = audioCtx.createMediaStreamSource(stream);
        const processor = audioCtx.createScriptProcessor(4096, 1, 1);
        STATE.processor = processor;

        const wsUrl = `ws://${CONFIG.host}:${STATE.wsPort}/realtime?model=Whisper-Large-v3-Turbo`;
        const ws = new WebSocket(wsUrl);
        STATE.ws = ws;

        ws.addEventListener('open', () => {
            ws.send(JSON.stringify({ type: 'session.update', session: { model: 'Whisper-Large-v3-Turbo' } }));
            statusEl.textContent = t('recording');
        });

        ws.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'conversation.item.input_audio_transcription.delta') {
                    interimText = msg.delta || '';
                    render();
                } else if (msg.type === 'conversation.item.input_audio_transcription.completed') {
                    if (msg.transcript) { finalText += msg.transcript + ' '; interimText = ''; render(); }
                } else if (msg.type === 'input_audio_buffer.speech_started') {
                    statusEl.textContent = t('speechDetected');
                } else if (msg.type === 'input_audio_buffer.speech_stopped') {
                    statusEl.textContent = t('recording');
                }
            } catch (_) {}
        });

        ws.addEventListener('error', () => {
            showError(I18N.actError[LANG](1), I18N.wsError[LANG](CONFIG.host, STATE.wsPort), true);
        });

        processor.onaudioprocess = (e) => {
            if (!STATE.ws || STATE.ws.readyState !== WebSocket.OPEN) return;
            const input = e.inputBuffer.getChannelData(0);
            const ratio = nativeRate / 16000;
            const outLen = Math.floor(input.length / ratio);
            const int16 = new Int16Array(outLen);
            let sumSq = 0;
            for (let i = 0; i < outLen; i++) {
                const srcIdx = i * ratio;
                const floor = Math.floor(srcIdx);
                const ceil = Math.min(floor + 1, input.length - 1);
                const frac = srcIdx - floor;
                const sample = input[floor] * (1 - frac) + input[ceil] * frac;
                sumSq += sample * sample;
                const s = Math.max(-1, Math.min(1, sample));
                int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            const bytes = new Uint8Array(int16.buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            STATE.ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: btoa(binary) }));

            const rms = Math.sqrt(sumSq / outLen);
            const db = rms > 0 ? 20 * Math.log10(rms) : -60;
            const norm = Math.max(0, Math.min(1, (Math.max(-60, Math.min(-6, db)) + 60) / 54));
            $('mic-level').style.width = (norm * 100) + '%';
        };

        source.connect(processor);
        const mute = audioCtx.createGain();
        mute.gain.value = 0;
        processor.connect(mute);
        mute.connect(audioCtx.destination);

    } catch (err) {
        showError(I18N.actError[LANG](1), err.message, true);
        actDone();
    }

    function render() {
        transcriptEl.innerHTML =
            `<span class="transcript-final">${escHtml(finalText)}</span>` +
            `<span class="transcript-interim">${escHtml(interimText)}</span>`;
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }
}

    actDone();

        '</div>' +
        '<div class="benchmark-chart" id="bench-chart"></div>' +

    const results = [];
    try {
        const npuR = await runBenchmarkPass(NPU_MODEL, 'NPU', 'resp-npu', 'stats-npu', 'spin-npu');
        if (npuR) results.push(npuR);

        $('resp-hybrid').textContent = '';
        $('resp-hybrid').style.color = '';
        $('spin-hybrid').classList.remove('hidden');
        const hybR = await runBenchmarkPass(HYBRID_MODEL, 'Hybrid', 'resp-hybrid', 'stats-hybrid', 'spin-hybrid');
        if (hybR) results.push(hybR);

        if (results.length === 2) showBenchmarkChart(results);
    } catch (err) {
        if (err.name !== 'AbortError') showError(I18N.actError[LANG](2), err.message, true);
    }
    actDone();
}

async function runBenchmarkPass(modelId, label, respId, statsId, spinId) {
    const wallStart = performance.now();
    await streamSSE('/v1/chat/completions', {
        model: modelId,
        messages: [{ role: 'user', content: BENCHMARK_PROMPT }],
        stream: true, max_tokens: 512,
    }, (full) => {
        // DEBUG: log raw content to browser console (open DevTools → Console)
        if (full.length < 100 || full.length % 200 < 10) {
            console.debug('[Act2 raw]', JSON.stringify(full.slice(0, 200)));
        }
        $(respId).textContent = stripThinking(full);
    });

    const wallSecs = (performance.now() - wallStart) / 1000;
    $(spinId).classList.add('hidden');

    let tps = 0, ttft = 0, tokens = 0;
    try {
        const stats = await fetchJSON('/v1/stats');
        tps = stats.tokens_per_second || 0;
        ttft = stats.time_to_first_token || 0;
        tokens = stats.output_tokens || 0;
        if (tps === 0 && tokens > 0) tps = tokens / wallSecs;
    } catch (_) {}

    $(statsId).textContent = `TPS: ${tps.toFixed(1)} | TTFT: ${(ttft*1000).toFixed(0)} ms | Tokens: ${tokens} | Wall: ${wallSecs.toFixed(1)}s`;
    await postJSON('/v1/unload', { model: modelId }).catch(() => {});
    return { label, tps, ttft, tokens, wallSecs };
}

function showBenchmarkChart(results) {
    const maxTps = Math.max(...results.map(r => r.tps)) || 1;
    const colors = { NPU: 'var(--act1)', Hybrid: 'var(--act4)' };
    const icons  = { NPU: '⚡', Hybrid: '🚀' };

    let html = '';
    for (const r of results) {
        html += `<div class="bar-row">
            <div class="bar-label" style="color:${colors[r.label]}">${icons[r.label]} ${r.label}</div>
            <div class="bar-track"><div class="bar-fill" style="background:${colors[r.label]}" id="bar-${r.label}">${r.tps.toFixed(1)} TPS</div></div>
            <div class="bar-value" style="color:${colors[r.label]}">${r.tps.toFixed(1)} t/s</div>
        </div>`;
    }
    const chart = $('bench-chart');
    chart.innerHTML = html;
    chart.style.display = 'block';

    requestAnimationFrame(() => {
        setTimeout(() => {
            for (const r of results) {
                $(`bar-${r.label}`).style.width = (r.tps / maxTps * 100).toFixed(1) + '%';
            }
        }, 50);
    });

    const best = results.reduce((a, b) => a.tps > b.tps ? a : b);
    const speedup = (results[1].tps / results[0].tps).toFixed(1);
    const winner = $('bench-winner');
    winner.style.color = colors[best.label];
    winner.innerHTML = `★ Winner: ${best.label} (${best.tps.toFixed(1)} tokens/sec)` +
        `<span style="color:var(--text-secondary);font-weight:400"> — ${speedup}× speedup</span>`;
    winner.style.display = 'block';
}

async function runAct3() {
    el.outputContent.innerHTML =
        '<div class="tts-text">' + escHtml(TTS_TEXT) + '</div>' +
        `<div style="color:var(--text-muted);font-size:0.95rem" id="tts-status"><span class="spinner"></span> ${t('synthesizing')}</div>` +
        '<div class="audio-progress hidden" id="audio-prog"><div class="audio-progress-bar" id="audio-bar"></div></div>';

    try {
        const ctrl = new AbortController();
        STATE.abortControllers.push(ctrl);

        const r = await fetch(`${CONFIG.serverUrl}/v1/audio/speech`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: 'kokoro-v1', voice: 'af_sarah', input: TTS_TEXT, response_format: 'mp3' }),
            signal: ctrl.signal,
        });

        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        STATE.audioEl = audio;

        $('tts-status').textContent = t('playing');
        $('audio-prog').classList.remove('hidden');

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) $('audio-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
        });
        audio.addEventListener('ended', () => {
            $('tts-status').textContent = t('playDone');
            $('audio-bar').style.width = '100%';
            postJSON('/v1/unload', { model: 'kokoro-v1' }).catch(() => {});
            actDone();
        });
        audio.addEventListener('error', () => {
            $('tts-status').textContent = t('playFail');
            actDone();
        });

        await audio.play().catch(() => {
            $('tts-status').innerHTML = `<button onclick="STATE.audioEl.play();this.remove();" style="padding:0.5rem 1rem;border:1px solid var(--act3);background:transparent;color:var(--act3);border-radius:8px;cursor:pointer;font-size:1rem">${t('clickToPlay')}</button>`;
        });
    } catch (err) {
        if (err.name !== 'AbortError') showError(I18N.actError[LANG](3), err.message, true);
        actDone();
    }
}

    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

    setInterval(checkHealth, 5000);
